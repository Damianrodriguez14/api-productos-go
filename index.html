<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Productos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; min-height: 100vh; padding: 2rem; color: #e2e8f0; }
    h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 0.25rem; color: #f8fafc; }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }
    .container { max-width: 900px; margin: 0 auto; }
    .form-card { background: #1e293b; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border: 1px solid #334155; }
    .form-card h2 { font-size: 1rem; font-weight: 500; margin-bottom: 1rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    input { padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.9rem; width: 200px; outline: none; transition: border 0.2s; }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #475569; }
    button.btn-add { padding: 10px 20px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: background 0.2s; }
    button.btn-add:hover { background: #4f46e5; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 2rem; }
    .stat { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.2rem; }
    .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .stat-value { font-size: 1.6rem; font-weight: 600; color: #f8fafc; }
    table { width: 100%; background: #1e293b; border-radius: 12px; border-collapse: collapse; border: 1px solid #334155; overflow: hidden; }
    th { background: #0f172a; color: #64748b; padding: 12px 16px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
    td { padding: 14px 16px; border-bottom: 1px solid #1e293b; font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #243044; }
    .precio { color: #34d399; font-weight: 500; }
    .stock-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
    .stock-ok { background: #064e3b; color: #34d399; }
    .stock-low { background: #7c2d12; color: #fb923c; }
    .btn-delete { padding: 5px 12px; background: transparent; color: #f87171; border: 1px solid #991b1b; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
    .btn-delete:hover { background: #991b1b; color: white; }
    .empty { text-align: center; padding: 3rem; color: #475569; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gestión de Productos</h1>
    <p class="subtitle">Sistema de inventario conectado a PostgreSQL</p>

    <div class="stats">
      <div class="stat">
        <p class="stat-label">Total productos</p>
        <p class="stat-value" id="stat-total">0</p>
      </div>
      <div class="stat">
        <p class="stat-label">Valor del inventario</p>
        <p class="stat-value" id="stat-valor">$0</p>
      </div>
      <div class="stat">
        <p class="stat-label">Stock bajo</p>
        <p class="stat-value" id="stat-bajo">0</p>
      </div>
    </div>

    <div class="form-card">
      <h2>Agregar producto</h2>
      <div class="form-row">
        <input type="text" id="nombre" placeholder="Nombre del producto">
        <input type="number" id="precio" placeholder="Precio">
        <input type="number" id="stock" placeholder="Stock">
        <button class="btn-add" onclick="crearProducto()">+ Agregar</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>

  <script>
    const API = 'http://localhost:8080';

    async function cargarProductos() {
      const res = await fetch(`${API}/productos`);
      const productos = await res.json();
      const tabla = document.getElementById('tabla');
      tabla.innerHTML = '';
      if (!productos || productos.length === 0) {
        tabla.innerHTML = '<tr><td colspan="5" class="empty">No hay productos todavía</td></tr>';
        actualizarStats([]);
        return;
      }
      productos.forEach(p => {
        const stockClass = p.stock < 20 ? 'stock-low' : 'stock-ok';
        tabla.innerHTML += `
          <tr>
            <td style="color:#475569">#${p.id}</td>
            <td style="font-weight:500">${p.nombre}</td>
            <td class="precio">$${p.precio.toLocaleString()}</td>
            <td><span class="stock-badge ${stockClass}">${p.stock} unid.</span></td>
            <td><button class="btn-delete" onclick="eliminarProducto(${p.id})">Eliminar</button></td>
          </tr>`;
      });
      actualizarStats(productos);
    }

    function actualizarStats(productos) {
      const total = productos.length;
      const valor = productos.reduce((acc, p) => acc + p.precio * p.stock, 0);
      const bajo = productos.filter(p => p.stock < 20).length;
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-valor').textContent = '$' + valor.toLocaleString();
      document.getElementById('stat-bajo').textContent = bajo;
    }

    async function crearProducto() {
      const nombre = document.getElementById('nombre').value;
      const precio = parseFloat(document.getElementById('precio').value);
      const stock = parseInt(document.getElementById('stock').value);
      if (!nombre || !precio || !stock) return alert('Completá todos los campos');
      await fetch(`${API}/productos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, precio, stock })
      });
      document.getElementById('nombre').value = '';
      document.getElementById('precio').value = '';
      document.getElementById('stock').value = '';
      cargarProductos();
    }

    async function eliminarProducto(id) {
      await fetch(`${API}/productos/${id}`, { method: 'DELETE' });
      cargarProductos();
    }

    cargarProductos();
  </script>
</body>
</html>
