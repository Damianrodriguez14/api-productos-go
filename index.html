<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Productos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; min-height: 100vh; padding: 2rem; color: #e2e8f0; }
    .container { max-width: 960px; margin: 0 auto; }
    h1 { font-size: 1.8rem; font-weight: 600; color: #f8fafc; margin-bottom: 4px; }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 2rem; }
    .stat { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.2rem; }
    .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .stat-value { font-size: 1.6rem; font-weight: 600; color: #f8fafc; }
    .toolbar { display: flex; gap: 12px; margin-bottom: 1.5rem; align-items: center; }
    .search-input { flex: 1; padding: 10px 14px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.9rem; outline: none; }
    .search-input:focus { border-color: #6366f1; }
    .search-input::placeholder { color: #475569; }
    .btn-primary { padding: 10px 20px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 500; white-space: nowrap; }
    .btn-primary:hover { background: #4f46e5; }
    table { width: 100%; background: #1e293b; border-radius: 12px; border-collapse: collapse; border: 1px solid #334155; overflow: hidden; margin-bottom: 1rem; }
    th { background: #0f172a; color: #64748b; padding: 12px 16px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
    td { padding: 14px 16px; border-bottom: 1px solid #0f172a; font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #243044; }
    .precio { color: #34d399; font-weight: 500; }
    .stock-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
    .stock-ok { background: #064e3b; color: #34d399; }
    .stock-low { background: #7c2d12; color: #fb923c; }
    .btn-edit { padding: 5px 12px; background: transparent; color: #60a5fa; border: 1px solid #1d4ed8; border-radius: 6px; cursor: pointer; font-size: 0.8rem; margin-right: 6px; }
    .btn-edit:hover { background: #1d4ed8; color: white; }
    .btn-delete { padding: 5px 12px; background: transparent; color: #f87171; border: 1px solid #991b1b; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
    .btn-delete:hover { background: #991b1b; color: white; }
    .empty { text-align: center; padding: 3rem; color: #475569; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 2rem; width: 100%; max-width: 420px; }
    .modal h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; color: #f8fafc; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.9rem; outline: none; }
    .form-group input:focus { border-color: #6366f1; }
    .modal-actions { display: flex; gap: 10px; margin-top: 1.5rem; justify-content: flex-end; }
    .btn-cancel { padding: 10px 20px; background: transparent; color: #94a3b8; border: 1px solid #334155; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    .btn-cancel:hover { background: #334155; }

    /* Confirm modal */
    .confirm-text { color: #94a3b8; font-size: 0.95rem; margin-bottom: 1.5rem; }
    .btn-danger { padding: 10px 20px; background: #dc2626; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    .btn-danger:hover { background: #b91c1c; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gestión de Productos</h1>
    <p class="subtitle">Sistema de inventario conectado a PostgreSQL</p>

    <div class="stats">
      <div class="stat">
        <p class="stat-label">Total productos</p>
        <p class="stat-value" id="stat-total">0</p>
      </div>
      <div class="stat">
        <p class="stat-label">Valor del inventario</p>
        <p class="stat-value" id="stat-valor">$0</p>
      </div>
      <div class="stat">
        <p class="stat-label">Stock bajo</p>
        <p class="stat-value" id="stat-bajo">0</p>
      </div>
    </div>

    <div class="toolbar">
      <input class="search-input" type="text" id="buscador" placeholder="Buscar producto..." oninput="filtrar()">
      <button class="btn-primary" onclick="abrirModalCrear()">+ Nuevo producto</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>

  <!-- Modal crear/editar -->
  <div class="modal-overlay" id="modalForm">
    <div class="modal">
      <h2 id="modal-titulo">Nuevo producto</h2>
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="m-nombre" placeholder="Nombre del producto">
      </div>
      <div class="form-group">
        <label>Precio</label>
        <input type="number" id="m-precio" placeholder="0">
      </div>
      <div class="form-group">
        <label>Stock</label>
        <input type="number" id="m-stock" placeholder="0">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="cerrarModales()">Cancelar</button>
        <button class="btn-primary" id="btn-guardar" onclick="guardar()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal confirmar eliminar -->
  <div class="modal-overlay" id="modalConfirm">
    <div class="modal">
      <h2>Eliminar producto</h2>
      <p class="confirm-text">¿Estás seguro que querés eliminar este producto? Esta acción no se puede deshacer.</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="cerrarModales()">Cancelar</button>
        <button class="btn-danger" onclick="confirmarEliminar()">Eliminar</button>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:8080';
    let productos = [];
    let editandoId = null;
    let eliminandoId = null;

    async function cargarProductos() {
      const res = await fetch(`${API}/productos`);
      productos = await res.json() || [];
      renderTabla(productos);
      actualizarStats(productos);
    }

    function renderTabla(lista) {
      const tabla = document.getElementById('tabla');
      tabla.innerHTML = '';
      if (!lista || lista.length === 0) {
        tabla.innerHTML = '<tr><td colspan="5" class="empty">No hay productos</td></tr>';
        return;
      }
      lista.forEach(p => {
        const stockClass = p.stock < 20 ? 'stock-low' : 'stock-ok';
        tabla.innerHTML += `
          <tr>
            <td style="color:#475569">#${p.id}</td>
            <td style="font-weight:500">${p.nombre}</td>
            <td class="precio">$${p.precio.toLocaleString()}</td>
            <td><span class="stock-badge ${stockClass}">${p.stock} unid.</span></td>
            <td>
              <button class="btn-edit" onclick="abrirModalEditar(${p.id}, '${p.nombre}', ${p.precio}, ${p.stock})">Editar</button>
              <button class="btn-delete" onclick="abrirModalEliminar(${p.id})">Eliminar</button>
            </td>
          </tr>`;
      });
    }

    function filtrar() {
      const termino = document.getElementById('buscador').value.toLowerCase();
      const filtrados = productos.filter(p => p.nombre.toLowerCase().includes(termino));
      renderTabla(filtrados);
    }

    function actualizarStats(lista) {
      const total = lista.length;
      const valor = lista.reduce((acc, p) => acc + p.precio * p.stock, 0);
      const bajo = lista.filter(p => p.stock < 20).length;
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-valor').textContent = '$' + valor.toLocaleString();
      document.getElementById('stat-bajo').textContent = bajo;
    }

    function abrirModalCrear() {
      editandoId = null;
      document.getElementById('modal-titulo').textContent = 'Nuevo producto';
      document.getElementById('m-nombre').value = '';
      document.getElementById('m-precio').value = '';
      document.getElementById('m-stock').value = '';
      document.getElementById('modalForm').classList.add('active');
    }

    function abrirModalEditar(id, nombre, precio, stock) {
      editandoId = id;
      document.getElementById('modal-titulo').textContent = 'Editar producto';
      document.getElementById('m-nombre').value = nombre;
      document.getElementById('m-precio').value = precio;
      document.getElementById('m-stock').value = stock;
      document.getElementById('modalForm').classList.add('active');
    }

    function abrirModalEliminar(id) {
      eliminandoId = id;
      document.getElementById('modalConfirm').classList.add('active');
    }

    function cerrarModales() {
      document.getElementById('modalForm').classList.remove('active');
      document.getElementById('modalConfirm').classList.remove('active');
    }

    async function guardar() {
      const nombre = document.getElementById('m-nombre').value;
      const precio = parseFloat(document.getElementById('m-precio').value);
      const stock = parseInt(document.getElementById('m-stock').value);
      if (!nombre || !precio || !stock) return alert('Completá todos los campos');
      if (editandoId) {
        await fetch(`${API}/productos/${editandoId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, precio, stock })
        });
      } else {
        await fetch(`${API}/productos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, precio, stock })
        });
      }
      cerrarModales();
      cargarProductos();
    }

    async function confirmarEliminar() {
      await fetch(`${API}/productos/${eliminandoId}`, { method: 'DELETE' });
      cerrarModales();
      cargarProductos();
    }

    cargarProductos();
  </script>
</body>
</html>
